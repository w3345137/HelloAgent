name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

env:
  NODE_VERSION: '20'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app structure
        run: |
          APP_NAME="Hello Agent"
          APP="build/${APP_NAME}.app"

          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources/web"
          mkdir -p "${APP}/Contents/Resources/web/lib"
          mkdir -p "${APP}/Contents/Resources/Data/core"
          mkdir -p "${APP}/Contents/Resources/Data/modules/adapters"
          mkdir -p "${APP}/Contents/Resources/Data/tools"
          mkdir -p "${APP}/Contents/Resources/Data/config"
          mkdir -p "${APP}/Contents/Resources/Data/logs"

          # Compile Objective-C shell
          clang -fobjc-arc -framework Cocoa -framework WebKit \
            -o "${APP}/Contents/MacOS/Hello Agent" \
            src/hello-agent-shell.m

          # Bundle Node.js binary
          cp "$(which node)" "${APP}/Contents/MacOS/node"

          # Copy web frontend
          cp web/index.html "${APP}/Contents/Resources/web/"
          cp -r web/lib/* "${APP}/Contents/Resources/web/lib/"
          cp web/logo.png "${APP}/Contents/Resources/web/" 2>/dev/null || true
          cp web/permissions.html "${APP}/Contents/Resources/web/" 2>/dev/null || true

          # Copy backend source
          cp src/core/*.js "${APP}/Contents/Resources/Data/core/"
          cp src/modules/*.js "${APP}/Contents/Resources/Data/modules/"
          cp src/modules/adapters/*.js "${APP}/Contents/Resources/Data/modules/adapters/"
          cp src/tools/*.js "${APP}/Contents/Resources/Data/tools/"
          cp src/config/*.example "${APP}/Contents/Resources/Data/config/" 2>/dev/null || true
          cp package.json "${APP}/Contents/Resources/Data/"

          # Install production dependencies in Data dir
          cd "${APP}/Contents/Resources/Data"
          npm install --production --no-optional 2>/dev/null || npm install --production
          cd "${{ github.workspace }}"

          # Copy Info.plist
          cp "Hello Agent.app/Contents/Info.plist" "${APP}/Contents/" 2>/dev/null || {
            cat > "${APP}/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Hello Agent</string>
            <key>CFBundleDisplayName</key><string>Hello Agent</string>
            <key>CFBundleIdentifier</key><string>com.helloagent.app</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>CFBundleExecutable</key><string>Hello Agent</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>app</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
          </dict>
          </plist>
          PLIST
          }

          # Copy app icon
          cp logo/app-icon.icns "${APP}/Contents/Resources/app.icns" 2>/dev/null || true

      - name: Zip macOS app
        run: |
          cd build
          zip -r -9 "../Hello-Agent-macOS.zip" "Hello Agent.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hello-Agent-macOS
          path: Hello-Agent-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Node.js binary
        run: |
          NODE_URL="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz"
          echo "Downloading $NODE_URL"
          curl -fsSL "$NODE_URL" -o node.tar.gz
          tar -xzf node.tar.gz
          NODE_BIN="node-v-${NODE_VERSION}-linux-x64/bin/node"
          echo "Node binary: $NODE_BIN"

      - name: Install dependencies
        run: npm ci

      - name: Package Linux
        run: |
          PKG="build/hello-agent"
          mkdir -p "${PKG}"

          # Bundle Node.js binary
          cp "node-v-${NODE_VERSION}-linux-x64/bin/node" "${PKG}/node"
          chmod +x "${PKG}/node"

          mkdir -p "${PKG}/Data/core"
          mkdir -p "${PKG}/Data/modules/adapters"
          mkdir -p "${PKG}/Data/tools"
          mkdir -p "${PKG}/Data/config"
          mkdir -p "${PKG}/Data/logs"
          mkdir -p "${PKG}/web/lib"

          # Copy web frontend
          cp web/index.html "${PKG}/web/"
          cp -r web/lib/* "${PKG}/web/lib/"
          cp web/logo.png "${PKG}/web/" 2>/dev/null || true

          # Copy backend source
          cp src/core/*.js "${PKG}/Data/core/"
          cp src/modules/*.js "${PKG}/Data/modules/"
          cp src/modules/adapters/*.js "${PKG}/Data/modules/adapters/"
          cp src/tools/*.js "${PKG}/Data/tools/"
          cp src/config/*.example "${PKG}/Data/config/" 2>/dev/null || true
          cp package.json "${PKG}/Data/"

          # Install production dependencies
          cd "${PKG}/Data"
          npm install --production --no-optional 2>/dev/null || npm install --production
          cd "${{ github.workspace }}"

          # Copy launcher scripts
          cp scripts/linux/start.sh "${PKG}/start.sh"
          chmod +x "${PKG}/start.sh"

          # Create .desktop file
          cat > "${PKG}/hello-agent.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Hello Agent
          Comment=Self-evolving AI Agent
          Exec=bash -c "cd $(dirname %f) && ./start.sh"
          Icon=hello-agent.png
          Terminal=false
          Type=Application
          Categories=AI;Utility;
          DESKTOP

      - name: Zip Linux package
        run: |
          cd build
          tar czf "../Hello-Agent-Linux.tar.gz" hello-agent

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hello-Agent-Linux
          path: Hello-Agent-Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Node.js binary
        shell: pwsh
        run: |
          $version = "${{ env.NODE_VERSION }}"
          $url = "https://nodejs.org/dist/v${version}/node-v${version}-win-x64.zip"
          Write-Host "Downloading $url"
          curl -fsSL "$url" -o node.zip
          Expand-Archive -Force node.zip
          Write-Host "Node binary extracted"

      - name: Install dependencies
        run: npm ci

      - name: Package Windows
        shell: pwsh
        run: |
          $pkg = "build\Hello-Agent"
          New-Item -ItemType Directory -Force -Path "$pkg"

          # Bundle Node.js binary
          Copy-Item "node-v-${{ env.NODE_VERSION }}-win-x64\node.exe" "$pkg\node.exe"

          New-Item -ItemType Directory -Force -Path "$pkg\Data\core"
          New-Item -ItemType Directory -Force -Path "$pkg\Data\modules\adapters"
          New-Item -ItemType Directory -Force -Path "$pkg\Data\tools"
          New-Item -ItemType Directory -Force -Path "$pkg\Data\config"
          New-Item -ItemType Directory -Force -Path "$pkg\Data\logs"
          New-Item -ItemType Directory -Force -Path "$pkg\web\lib"

          # Copy web frontend
          Copy-Item "web\index.html" "$pkg\web\"
          Copy-Item "web\lib\*" "$pkg\web\lib\"
          if (Test-Path "web\logo.png") { Copy-Item "web\logo.png" "$pkg\web\" }

          # Copy backend source
          Copy-Item "src\core\*.js" "$pkg\Data\core\"
          Copy-Item "src\modules\*.js" "$pkg\Data\modules\"
          Copy-Item "src\modules\adapters\*.js" "$pkg\Data\modules\adapters\"
          Copy-Item "src\tools\*.js" "$pkg\Data\tools\"
          if (Test-Path "src\config\*.example") { Copy-Item "src\config\*.example" "$pkg\Data\config\" }
          Copy-Item "package.json" "$pkg\Data\"

          # Install production dependencies
          Set-Location "$pkg\Data"
          npm install --production --no-optional 2>$null; if ($LASTEXITCODE -ne 0) { npm install --production }
          Set-Location "$env:GITHUB_WORKSPACE"

          # Copy launcher scripts
          Copy-Item "scripts\windows\start.bat" "$pkg\start.bat"
          Copy-Item "scripts\windows\start.ps1" "$pkg\start.ps1"

          # Create shortcut
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$pkg\Hello Agent.lnk")
          $Shortcut.TargetPath = "$pkg\start.bat"
          $Shortcut.WorkingDirectory = "$pkg"
          $Shortcut.Description = "Hello Agent - Self-evolving AI Agent"
          $Shortcut.Save()

      - name: Zip Windows package
        shell: pwsh
        run: |
          Compress-Archive -Path "build\Hello-Agent" -DestinationPath "Hello-Agent-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hello-Agent-Windows
          path: Hello-Agent-Windows.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Hello Agent ${{ steps.version.outputs.tag }}
          body: |
            ## Hello Agent ${{ steps.version.outputs.tag }}

            ### 📦 Downloads
            | Platform | File | Requirements |
            |----------|-------|---------------|
            | macOS | `Hello-Agent-macOS.zip` | macOS 11+ |
            | Windows | `Hello-Agent-Windows.zip` | Windows 10+ |
            | Linux | `Hello-Agent-Linux.tar.gz` | Ubuntu 18.04+ |

            ### 🚀 Installation

            **macOS**:
            1. 下载 `Hello-Agent-macOS.zip`
            2. 解压，将 `Hello Agent.app` 拖入 `/Applications/` 目录
            3. 打开 Hello Agent，首次运行需在 设置 → 资源配置 中填入 AI 模型 API 密钥

            **Windows**:
            1. 下载 `Hello-Agent-Windows.zip`
            2. 解压到任意目录（如 `C:\Program Files\Hello Agent`）
            3. 双击 `start.bat` 或 `Hello Agent.lnk` 启动

            **Linux**:
            1. 下载 `Hello-Agent-Linux.tar.gz`
            2. 解压到任意目录
            3. 运行 `./start.sh` 或双击 `hello-agent.desktop`（需赋予执行权限）

            > 💡 下载 APP 后无需安装 Node.js，所有依赖已内置于压缩包中。

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}
          files: |
            artifacts/Hello-Agent-macOS/Hello-Agent-macOS.zip
            artifacts/Hello-Agent-Windows/Hello-Agent-Windows.zip
            artifacts/Hello-Agent-Linux/Hello-Agent-Linux.tar.gz
          draft: false
          prerelease: false
